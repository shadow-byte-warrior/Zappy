server {
    listen 80;
    server_name localhost;

    # Security Headers (Phase 4 Hardening)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (allows external API and asset loads)
    add_header Content-Security-Policy "default-src 'self' https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https: fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https: fonts.gstatic.com; connect-src 'self' https: wss:; frame-ancestors 'none';" always;
    
    # HSTS Policy (enforce HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing fallback (Vite SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for compiled static assets (immutable)
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache Control for static media assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif|woff|woff2)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
        access_log off;
    }

    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
